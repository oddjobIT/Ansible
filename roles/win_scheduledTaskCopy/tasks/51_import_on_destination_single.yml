---
- name: 51 Import scheduled tasks on destination
  delegate_to: "{{ dest_host }}"
  block:

    - name: Check if scheduled task exists
      ansible.windows.win_shell: |
        schtasks /Query /TN "{{ item }}"
      register: task_check
      failed_when: false
      changed_when: false
      loop: "{{ task_names }}"
      loop_control:
        label: "{{ item }}"

    - name: Create scheduled task if missing
      ansible.windows.win_shell: |
        $name = "{{ item.item }}"
        $safe = $name -replace '[\\/]', '_'
        $xml  = Join-Path "{{ import_dir }}" ($safe + ".xml")
        schtasks /Create /TN "$name" /XML "$xml" /RU "SYSTEM"
      when: item.rc != 0
      loop: "{{ task_check.results }}"
      loop_control:
        label: "{{ item.item }}"
        